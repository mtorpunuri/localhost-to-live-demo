<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌿 Jungle Todos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Nunito:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <header>
      <h1>🌿 Jungle Todos 🐒</h1>
      <p class="subtitle">Hack your way through the day, one task at a time.</p>
    </header>

    <section class="add-todo">
      <form id="todo-form">
        <input
          id="todo-input"
          type="text"
          placeholder="Plant a new task in the canopy…"
          autocomplete="off"
          required
        />
        <button type="submit">Grow 🌱</button>
      </form>
    </section>

    <section class="todos">
      <ul id="todo-list"></ul>
      <p id="empty-state" class="empty">The jungle is quiet. Plant a todo to get started.</p>
    </section>

    <footer>
      <span id="count">0 vines</span>
      <button id="clear-completed" type="button">Clear the underbrush</button>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
