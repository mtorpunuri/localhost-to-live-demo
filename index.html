<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎪 The Greatest To-Do on Earth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Bungee&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <header>
      <h1>🎪 The Greatest To-Do on Earth 🎪</h1>
      <p class="subtitle">Step right up — the show starts when you click "Add!"</p>
    </header>

    <section class="add-todo">
      <form id="todo-form">
        <input
          id="todo-input"
          type="text"
          placeholder="Step right up and add a task!"
          autocomplete="off"
          required
        />
        <button type="submit">Add!</button>
      </form>
    </section>

    <section class="todos">
      <ul id="todo-list"></ul>
      <p id="empty-state" class="empty">The big top is empty! Add a todo to start the show.</p>
    </section>

    <footer>
      <span id="count">0 acts in the show</span>
      <button id="clear-completed" type="button">Sweep the ring</button>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
